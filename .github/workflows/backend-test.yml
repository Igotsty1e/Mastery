name: backend-test

# Pre-merge gate for the Mastery backend (Node.js + Vitest +
# composition audit).
#
# CLAUDE.md lists `cd backend && npm test` as the pre-merge check;
# this workflow runs it on every PR so the gate is mechanical, not
# ceremonial. It also runs `npm run build` (tsc) to catch TS
# regressions and `npm run audit:composition` to enforce the Wave C
# composition rules in `exercise_structure.md §6.7`.
#
# Tests use @electric-sql/pglite (Postgres-in-wasm), so no external DB
# service is needed — fully hermetic.

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'exercise_structure.md'
      - '.github/workflows/backend-test.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'exercise_structure.md'
      - '.github/workflows/backend-test.yml'

jobs:
  test:
    name: backend test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npm run build

      - name: Vitest
        run: npm test

      - name: Composition audit (exercise_structure.md §6.7)
        run: npm run audit:composition
