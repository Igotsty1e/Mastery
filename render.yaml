services:
  # ── Node/Express API ──────────────────────────────────────────────────────
  - type: web
    name: mastery-backend-igotsty1e
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: stub           # change to "openai" once you have a key
      - key: OPENAI_API_KEY
        sync: false           # set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini    # ignored when AI_PROVIDER=stub
      - key: PUBLIC_WEB_ORIGIN
        sync: false           # set manually in the deployment dashboard

  # ── Flutter web (static) ──────────────────────────────────────────────────
  - type: web
    name: mastery-web-igotsty1e
    runtime: static
    buildCommand: bash scripts/render-build-web.sh
    staticPublishPath: app/build/web
    envVars:
      - key: API_BASE_URL
        sync: false           # set manually in the deployment dashboard
      - key: REQUIRE_API_BASE_URL
        value: true
