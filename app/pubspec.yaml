name: mastery
description: Structured English practice — linear lesson flow, backend-evaluated.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  uuid: ^4.4.2
  provider: ^6.1.2
  shared_preferences: 2.3.3
  # Audio playback for `listening_discrimination` exercises. Cross-platform
  # (iOS / Android / macOS / web). Pinned at 5.x because 6.x bumps the Dart
  # SDK requirement above what Render's Flutter 3.22.2 image supplies.
  audioplayers: ^5.2.1
  # Network image with proper CORS handling on Flutter web canvaskit. Pinned
  # at 3.3.x because 3.4.x bumps minimum Dart SDK above what Render's Flutter
  # 3.22.2 image ships.
  cached_network_image: ^3.3.1
  # Wave 7.4 — refresh-token storage. iOS Keychain / Android KeyStore /
  # macOS Keychain / web encrypted-localStorage / Linux libsecret. Pinned
  # at 9.2.x because 10.x bumps minimum Dart SDK above what Render's
  # Flutter 3.22.2 image ships.
  flutter_secure_storage: ^9.2.2
  # Wave G5 — feedback button on the summary screen opens a mailto:
  # link via `launchUrl(...)`. Pinned at 6.2.x for Dart 3.4 compat
  # under Render's Flutter 3.22.2 image.
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
        - asset: assets/fonts/Fraunces-Italic-Variable.ttf
          style: italic
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500

# Render uses Flutter 3.22.2 / Dart 3.4.3. These transitive packages jumped to
# sdk ^3.5.0+ in later releases, so we cap them at the last Dart-3.4-compatible
# versions until the Render build image is upgraded.
dependency_overrides:
  shared_preferences_android: 2.3.2
  shared_preferences_foundation: 2.5.4
  shared_preferences_platform_interface: 2.4.1
